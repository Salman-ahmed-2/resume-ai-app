<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2234"/>
    </linearGradient>
    <!-- Gold shimmer -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e8c97a"/>
      <stop offset="50%"  stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#b8934e"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c8a96e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softshadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow blob -->
  <ellipse cx="600" cy="315" rx="380" ry="260" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Gold top rule -->
  <rect x="80" y="82" width="120" height="3" rx="2" fill="url(#gold)"/>

  <!-- Badge pill -->
  <rect x="80" y="102" width="168" height="28" rx="14"
    fill="rgba(200,169,110,0.12)" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="164" y="121" text-anchor="middle"
    font-family="'DM Sans', system-ui, sans-serif" font-size="13" font-weight="600"
    fill="#c8a96e" letter-spacing="0.5">AI-POWERED</text>

  <!-- Main headline -->
  <text x="80" y="222"
    font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700"
    fill="#e8e5dc" letter-spacing="-1">
    AI Resume Builder
  </text>
  <text x="80" y="306"
    font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400"
    fill="#c8a96e" font-style="italic" letter-spacing="-1">
    &amp; Interview Coach
  </text>

  <!-- Subline -->
  <text x="80" y="366"
    font-family="'DM Sans', system-ui, sans-serif" font-size="24" font-weight="400"
    fill="#b5ad93" letter-spacing="0.2">
    Build · Optimize · Practice · Land Your Dream Job
  </text>

  <!-- Feature chips -->
  <g font-family="'DM Sans', system-ui, sans-serif" font-size="15" font-weight="500">
    <!-- ATS Scoring -->
    <rect x="80"  y="408" width="158" height="34" rx="17"
      fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <circle cx="107" cy="425" r="6" fill="#22c55e"/>
    <text x="122" y="430" fill="#86efac">ATS Scoring</text>

    <!-- 4 Templates -->
    <rect x="254" y="408" width="158" height="34" rx="17"
      fill="rgba(129,140,248,0.10)" stroke="rgba(129,140,248,0.3)" stroke-width="1"/>
    <circle cx="281" cy="425" r="6" fill="#818cf8"/>
    <text x="296" y="430" fill="#a5b4fc">4 Templates</text>

    <!-- Mock Interviews -->
    <rect x="428" y="408" width="180" height="34" rx="17"
      fill="rgba(244,114,182,0.10)" stroke="rgba(244,114,182,0.3)" stroke-width="1"/>
    <circle cx="455" cy="425" r="6" fill="#f472b6"/>
    <text x="470" y="430" fill="#f9a8d4">Mock Interviews</text>

    <!-- Gemini + Claude -->
    <rect x="624" y="408" width="186" height="34" rx="17"
      fill="rgba(200,169,110,0.10)" stroke="rgba(200,169,110,0.3)" stroke-width="1"/>
    <circle cx="651" cy="425" r="6" fill="#c8a96e"/>
    <text x="666" y="430" fill="#d4b47a">Gemini + Claude</text>
  </g>

  <!-- Divider -->
  <line x1="80" y1="480" x2="560" y2="480" stroke="#2d3748" stroke-width="1"/>

  <!-- Domain -->
  <text x="80" y="510"
    font-family="'DM Sans', system-ui, sans-serif" font-size="18" font-weight="400"
    fill="#6e644b" letter-spacing="1">
    ai-resume-builder.vercel.app
  </text>

  <!-- Decorative resume card (right side) -->
  <g filter="url(#softshadow)">
    <rect x="760" y="80" width="360" height="470" rx="16"
      fill="#1a2234" stroke="#2d3748" stroke-width="1"/>
    <!-- Card header stripe -->
    <rect x="760" y="80" width="360" height="52" rx="16" fill="#0f1923"/>
    <rect x="760" y="108" width="360" height="24" fill="#0f1923"/>
    <!-- Gold accent bar -->
    <rect x="760" y="132" width="360" height="3" fill="url(#gold)" opacity="0.7"/>
    <!-- Fake name -->
    <rect x="790" y="97"  width="100" height="18" rx="4" fill="#c8a96e" opacity="0.8"/>
    <rect x="900" y="100" width="70"  height="12" rx="3" fill="#4a5568"/>
    <!-- Content lines -->
    <rect x="790" y="158" width="60"  height="8"  rx="2" fill="#4a5568" opacity="0.8"/>
    <rect x="790" y="174" width="290" height="5"  rx="2" fill="#2d3748"/>
    <rect x="790" y="185" width="260" height="5"  rx="2" fill="#2d3748"/>
    <rect x="790" y="196" width="270" height="5"  rx="2" fill="#2d3748"/>
    <!-- Section 2 -->
    <rect x="790" y="224" width="80"  height="8"  rx="2" fill="#4a5568" opacity="0.8"/>
    <rect x="790" y="240" width="200" height="12" rx="3" fill="#1e2d45"/>
    <rect x="790" y="259" width="290" height="5"  rx="2" fill="#2d3748"/>
    <rect x="790" y="270" width="250" height="5"  rx="2" fill="#2d3748"/>
    <rect x="790" y="281" width="270" height="5"  rx="2" fill="#2d3748"/>
    <rect x="790" y="292" width="220" height="5"  rx="2" fill="#2d3748"/>
    <!-- Section 3 -->
    <rect x="790" y="318" width="200" height="12" rx="3" fill="#1e2d45"/>
    <rect x="790" y="337" width="290" height="5"  rx="2" fill="#2d3748"/>
    <rect x="790" y="348" width="240" height="5"  rx="2" fill="#2d3748"/>
    <rect x="790" y="359" width="260" height="5"  rx="2" fill="#2d3748"/>
    <!-- Skills pills -->
    <rect x="790" y="388" width="70"  height="22" rx="11" fill="rgba(129,140,248,0.15)" stroke="rgba(129,140,248,0.3)" stroke-width="1"/>
    <rect x="870" y="388" width="60"  height="22" rx="11" fill="rgba(52,211,153,0.15)"  stroke="rgba(52,211,153,0.3)"  stroke-width="1"/>
    <rect x="940" y="388" width="80"  height="22" rx="11" fill="rgba(244,114,182,0.15)" stroke="rgba(244,114,182,0.3)" stroke-width="1"/>
    <!-- Score ring -->
    <circle cx="1060" cy="440" r="38" fill="none" stroke="#2d3748" stroke-width="6"/>
    <circle cx="1060" cy="440" r="38" fill="none" stroke="#22c55e" stroke-width="6"
      stroke-linecap="round" stroke-dasharray="239" stroke-dashoffset="60"
      transform="rotate(-90 1060 440)"/>
    <text x="1060" y="444" text-anchor="middle" dominant-baseline="middle"
      font-family="'DM Sans', system-ui, sans-serif" font-size="18" font-weight="700" fill="#22c55e">87</text>
    <text x="1060" y="462" text-anchor="middle"
      font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#4a5568">ATS Score</text>
  </g>

  <!-- Bottom gold rule -->
  <rect x="80" y="572" width="1040" height="1" fill="#2d3748"/>
  <rect x="80" y="572" width="200" height="1" fill="url(#gold)" opacity="0.5"/>
</svg>
